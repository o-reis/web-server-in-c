<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>503 | System Frozen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Snow animation */
        .snowflake {
            color: #fff;
            font-size: 1em;
            font-family: Arial;
            text-shadow: 0 0 1px #000;
        }
        
        @keyframes snowfall {
            0% { transform: translateY(-10vh) translateX(0); opacity: 1; }
            100% { transform: translateY(100vh) translateX(20px); opacity: 0; }
        }
        
        .flake {
            position: absolute;
            top: -10px;
            z-index: 0;
            color: white;
            opacity: 0.8;
            animation: snowfall linear infinite;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        @keyframes pulse-cold {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); }
        }

        .cold-glow {
            animation: pulse-cold 3s infinite;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ice: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-ice-900 via-slate-900 to-black h-screen w-full flex items-center justify-center overflow-hidden relative selection:bg-ice-500 selection:text-white">

    <!-- Background Snowflakes -->
    <div id="snow-container" class="absolute inset-0 pointer-events-none"></div>

    <!-- Main Content -->
    <div class="relative z-10 px-6 w-full max-w-lg">
        <div class="glass-panel p-8 md:p-12 rounded-3xl text-center border-t-4 border-t-ice-500 cold-glow">
            
            <!-- Icon -->
            <div class="relative inline-block mb-8 group">
                <div class="absolute inset-0 bg-blue-500 blur-2xl opacity-20 group-hover:opacity-40 transition-opacity duration-500 rounded-full"></div>
                <div class="bg-gradient-to-br from-ice-100 to-ice-500 w-24 h-24 rounded-2xl flex items-center justify-center relative shadow-lg mx-auto transform rotate-3 group-hover:rotate-6 transition-transform duration-300">
                    <i data-lucide="snowflake" class="w-12 h-12 text-ice-900 animate-spin" style="animation-duration: 10s;"></i>
                    
                    <!-- Frozen Badge -->
                    <div class="absolute -top-3 -right-3 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-lg shadow-md transform -rotate-12 border border-red-400">
                        503
                    </div>
                </div>
            </div>

            <!-- Text -->
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-4 tracking-tight">System Frozen</h1>
            <p class="text-ice-100 text-lg mb-8 leading-relaxed">
                Our servers are currently undergoing a mandatory defrost cycle. It's a bit too chilly in the data center right now.
            </p>

            <!-- Status Indicator -->
            <div class="bg-black/30 rounded-xl p-4 mb-8 border border-white/10 backdrop-blur-sm">
                <div class="flex items-center justify-between text-sm text-ice-100 mb-2">
                    <span>Defrosting Progress</span>
                    <span id="percent">72%</span>
                </div>
                <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-gradient-to-r from-ice-500 to-blue-400 w-[72%] rounded-full relative overflow-hidden">
                        <div class="absolute inset-0 bg-white/20 animate-[shimmer_2s_infinite] transform -skew-x-12 translate-x-[-100%]"></div>
                    </div>
                </div>
                <p class="text-xs text-slate-400 mt-2 text-left flex items-center gap-2">
                    <i data-lucide="server" class="w-3 h-3"></i>
                    <span>Estimating thaw time: <span class="text-white">~5 mins</span></span>
                </p>
            </div>

            <!-- Actions -->
            <div class="flex flex-col gap-3">
                <button onclick="window.location.reload()" class="w-full py-3.5 bg-white text-ice-900 font-bold rounded-xl hover:bg-ice-50 transition-all flex items-center justify-center gap-2 group shadow-lg shadow-white/10">
                    <i data-lucide="refresh-cw" class="w-4 h-4 group-hover:rotate-180 transition-transform duration-500"></i>
                    Try to Thaw (Refresh)
                </button>
                
                <a href="#" class="text-sm text-slate-400 hover:text-white transition-colors py-2">
                    Contact Support
                </a>
            </div>
            
            <div class="mt-8 pt-6 border-t border-white/10 text-xs text-slate-500">
                Error Code: 503_ICE_AGE_DETECTED
            </div>
        </div>
    </div>

    <!-- Decorative Elements -->
    <div class="absolute bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-ice-500/10 to-transparent pointer-events-none"></div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Create Snow
        const snowContainer = document.getElementById('snow-container');
        const flakeCount = 50;

        for (let i = 0; i < flakeCount; i++) {
            const flake = document.createElement('div');
            flake.classList.add('flake');
            
            // Random positioning and sizing
            const x = Math.random() * 100;
            const delay = Math.random() * 5;
            const duration = 3 + Math.random() * 7;
            const size = 2 + Math.random() * 4;
            
            flake.style.left = `${x}vw`;
            flake.style.animationDelay = `${delay}s`;
            flake.style.animationDuration = `${duration}s`;
            flake.style.width = `${size}px`;
            flake.style.height = `${size}px`;
            flake.style.backgroundColor = 'white';
            flake.style.borderRadius = '50%';
            flake.style.opacity = Math.random() * 0.5 + 0.3;
            
            snowContainer.appendChild(flake);
        }
    </script>
</body>
</html>
